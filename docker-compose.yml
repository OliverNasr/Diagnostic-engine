version: "3.9"

services:
  diagnostic_engine:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime          # use the lean runtime stage
    image: diagnostic_engine:latest
    container_name: diagnostic_engine
    restart: unless-stopped

    # Mount the data directory so the CSV can be updated without
    # rebuilding the image.
    volumes:
      - ./data:/app/data:ro   # read-only inside the container

    # Expose the service on the host
    ports:
      - "${PORT:-8000}:8000"

    environment:
      - SERVICE_NAME=${SERVICE_NAME:-Diagnostic Engine}
      - SERVICE_VERSION=${SERVICE_VERSION:-1.0.0}
      - DATASET_PATH=${DATASET_PATH:-data/dtc_dataset.csv}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - HOST=0.0.0.0
      - PORT=8000
      - RELOAD=${RELOAD:-false}

    # Hot-reload variant — override the CMD for development
    # Uncomment the lines below (and comment out the image CMD) to
    # enable uvicorn --reload inside Docker:
    #
    # command: >
    #   uvicorn app.main:app
    #   --host 0.0.0.0
    #   --port 8000
    #   --reload
    #
    # Also mount the source so edits are picked up without rebuild:
    # volumes:
    #   - ./data:/app/data:ro
    #   - ./app:/app/app       # live source mount

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
